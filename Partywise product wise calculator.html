<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Party Plan Product Wise V5</title>
<style>
    body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #eef5ef; }
    header { background: #167a3a; color: #fff; padding: 16px; font-size: 24px; font-weight: 700; position: sticky; top: 0; z-index: 100; }
    .card { background: #fff; margin: 10px; padding: 14px; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.12); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
    input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    button { background: #167a3a; color: #fff; border: none; border-radius: 8px; padding: 10px 14px; margin: 4px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
    button:hover { background: #12632f; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border-bottom: 1px solid #ddd; padding: 8px; text-align: center; }
    th { background: #167a3a; color: #fff; }
    th:nth-child(1), td:nth-child(1) { width: 35%; font-size: 13px; text-align: left; font-weight: bold; }
    th:nth-child(2), td:nth-child(2) { width: 18%; font-size: 12px; }
    th:nth-child(3), td:nth-child(3) { width: 22%; }
    th:nth-child(4), td:nth-child(4) { width: 25%; font-size: 12px; font-weight: bold; }
    .qty { width: 100%; font-size: 16px; text-align: center; }
    .active { background: #e8f8ec; }
    .footer { position: sticky; bottom: 0; background: #fff; border-top: 4px solid #167a3a; padding: 12px; display: flex; justify-content: space-around; font-weight: bold; z-index: 100; }
    .badge { background: #167a3a; color: #fff; padding: 5px 12px; border-radius: 20px; }

    /* Print-Specific Styling */
    @media print {
        body { background: #fff; }
        .no-print { display: none !important; }
        .card { box-shadow: none; margin: 0; padding: 0; }
        header { position: static; }
        .footer { position: static; border-top: none; margin-top: 20px; }
        /* Hide rows with 0 quantity during print to keep the report professional */
        tbody tr:not(.active) { display: none; } 
    }
</style>
</head>
<body>

<header>🌱 Party Plan Product Wise</header>

<div class="card">
    <div class="grid">
        <div><b>Party Name</b><input id="party" placeholder="Enter Party Name"></div>
        <div><b>Sales Officer</b><input id="officer" placeholder="Enter Officer Name"></div>
        <div><b>Date</b><input id="dt" type="date"></div>
        <div class="no-print">
            <b>Saved Parties</b>
            <select id="saved">
                <option value="">-- Select to Load --</option>
            </select>
        </div>
    </div>
    <br>
    <div class="no-print">
        <button onclick="saveData()">💾 Save</button>
        <button onclick="loadData()">📂 Load</button>
        <button onclick="clearAll()">🗑 Clear All</button>
        <button onclick="window.print()">🖨 Print</button>
    </div>
</div>

<div class="card">
    <input id="searchBox" class="no-print" placeholder="🔍 Search Product..." onkeyup="filterProducts()">
    <table>
        <thead>
            <tr><th>Product</th><th>Price</th><th>Qty</th><th>Value</th></tr>
        </thead>
        <tbody id="tb"></tbody>
    </table>
</div>

<div class="footer">
    <div>Total Qty<br><span id="tq" class="badge">0.00</span></div>
    <div>Total Value<br><span id="tv" class="badge">₹0</span></div>
</div>

<script>
const products = [
    ["ASTOR", 13590], ["ATMOS", 4448], ["BOSNATE", 3920], ["CYANAT", 5400], ["DEXARON", 2046],
    ["DI-FORCE", 2169], ["GLACPOT", 756], ["GLANZ", 5095], ["HATRIK", 1589], ["NATCORE", 1088],
    ["NATCRUSH", 3600], ["NATDUO", 146], ["NATERRA", 90], ["NATGEN", 4262], ["NATGEN PRO", 14868],
    ["NATJEWEL FS", 718], ["NATLAM", 391], ["NATLIGO", 3090], ["NATLIKA", 1043], ["NATNEXT", 3403],
    ["NATPEARL", 1807], ["NATVOL", 3822], ["NATWEEZ", 1056], ["NATZOATE", 1135], ["OMNINAT", 1719],
    ["PAMUK", 4500], ["PRIDONAT", 2980], ["SCRIPTOR", 43115], ["SLAYDEN", 1684], ["SPIROVANTA", 3000],
    ["TOPRASURE", 28981], ["VECTRA", 2200], ["VINASAK", 1501], ["XYMEN", 12167]
];

const tb = document.getElementById("tb");
const PREFIX = "PartyPlan_";

// Initialize Table
products.forEach((p, index) => {
    tb.innerHTML += `<tr>
        <td>${p[0]}</td>
        <td>₹${p[1].toLocaleString()}</td>
        <td><input class='qty' id='qty_${index}' data-p='${p[1]}' type='number' step='0.01' oninput='calc()'></td>
        <td class='v'>₹0</td>
    </tr>`;
});

// Set Today's Date
document.getElementById("dt").value = new Date().toISOString().slice(0,10);
populateDropdown();

// Calculate Totals
function calc() {
    let tq = 0, tv = 0;
    document.querySelectorAll("#tb tr").forEach(r => {
        let q = r.querySelector(".qty");
        let qty = parseFloat(q.value) || 0;
        let p = parseFloat(q.dataset.p);
        let v = Math.round(qty * p);
        
        r.querySelector(".v").innerText = "₹" + v.toLocaleString();
        r.className = qty > 0 ? "active" : "";
        
        tq += qty;
        tv += v;
    });
    document.getElementById("tq").innerText = tq.toFixed(2);
    document.getElementById("tv").innerText = "₹" + tv.toLocaleString();
}

// Clear Form
function clearAll() {
    if (!confirm("Clear all quantities and reset the form?")) return;
    document.querySelectorAll(".qty").forEach(q => q.value = "");
    document.getElementById("party").value = "";
    calc();
}

// Search / Filter Function
function filterProducts() {
    let input = document.getElementById("searchBox").value.toUpperCase();
    let rows = document.querySelectorAll("#tb tr");
    rows.forEach(row => {
        let productName = row.cells[0].innerText.toUpperCase();
        row.style.display = productName.includes(input) ? "" : "none";
    });
}

// Save Data to Local Storage
function saveData() {
    const partyName = document.getElementById("party").value.trim();
    if (!partyName) {
        alert("Please enter a Party Name to save.");
        return;
    }

    const officer = document.getElementById("officer").value;
    const dt = document.getElementById("dt").value;
    const items = {};

    document.querySelectorAll(".qty").forEach((q, index) => {
        if (q.value && parseFloat(q.value) > 0) {
            items[index] = q.value;
        }
    });

    const record = { officer, dt, items };
    localStorage.setItem(PREFIX + partyName, JSON.stringify(record));
    
    alert(`Data for ${partyName} saved successfully!`);
    populateDropdown();
    document.getElementById("saved").value = PREFIX + partyName;
}

// Populate Saved Parties Dropdown
function populateDropdown() {
    const select = document.getElementById("saved");
    select.innerHTML = '<option value="">-- Select to Load --</option>';
    
    for (let i = 0; i < localStorage.length; i++) {
        let key = localStorage.key(i);
        if (key.startsWith(PREFIX)) {
            let partyName = key.replace(PREFIX, "");
            select.innerHTML += `<option value="${key}">${partyName}</option>`;
        }
    }
}

// Load Data from Local Storage
function loadData() {
    const select = document.getElementById("saved");
    const key = select.value;
    
    if (!key) {
        alert("Please select a saved party from the dropdown first.");
        return;
    }

    const record = JSON.parse(localStorage.getItem(key));
    if (record) {
        document.getElementById("party").value = key.replace(PREFIX, "");
        document.getElementById("officer").value = record.officer || "";
        document.getElementById("dt").value = record.dt || new Date().toISOString().slice(0,10);
        
        // Clear current quantities
        document.querySelectorAll(".qty").forEach(q => q.value = "");
        
        // Apply saved quantities
        for (const [index, val] of Object.entries(record.items)) {
            let input = document.getElementById(`qty_${index}`);
            if (input) input.value = val;
        }
        
        calc();
        // Reset search filter visually if applied
        document.getElementById("searchBox").value = "";
        filterProducts();
    }
}
</script>
</body>
</html>
